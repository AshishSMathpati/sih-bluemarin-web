<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(226, 254, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .list0 {
            width: 100%;
            background-color: rgb(207, 255, 255);
            box-shadow: 1px 1px 1px 1px rgb(158, 158, 158);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

       h2{
        margin-left: 20px;
       }
        .list1 {
            width: 100%;
            height: 80px;
            background-color: rgb(255, 255, 255);
            box-shadow: 1px 1px 1px 1px rgb(158, 158, 158);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            margin-top: 5px;
            border-radius: 10px;
             animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.box:nth-child(1) { animation-delay: 0s; }
.box:nth-child(2) { animation-delay: 0.5s; }
.box:nth-child(3) { animation-delay: 1s; }
.box:nth-child(4) { animation-delay: 1.5s; }


        .pfp {
            border-radius: 50%;
        }

        .buy{
      width: 300px;
      padding: 12px;
      margin-top: 15px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 100px;
      animation: fadeUp 1s ease forwards;
        }
    </style>
</head>
